<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x41 - Reverse IP Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="matrix-bg"></canvas>

    <main class="container">
        <header class="header">
            <h1 class="logo"><span class="break">0x41</span></h1>
            <p class="subtitle"></p>
            <div class="mood-chip">
                <i data-lucide="heart-off"></i>
                <span>Connection dropped between 0x41 and 0x42</span>
            </div>
        </header>

        <section class="search-section">
            <form id="search-form" class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="target-input" placeholder="Enter IP or domain (example.com)" required autocomplete="off">
                <button type="submit" id="search-btn">
                    <span>Resolve</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
            <div id="error-msg" class="error-message hidden"></div>
        </section>

        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p>Looking for hosts while the signal still hurts...</p>
        </div>

        <section id="results" class="results-section hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i data-lucide="globe"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Target Name</span>
                        <h3 id="res-target" class="stat-value">-</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i data-lucide="network"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Resolved IP</span>
                        <h3 id="res-ip" class="stat-value">-</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i data-lucide="layers"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Unique Domains</span>
                        <h3 id="res-total" class="stat-value highlight-text">-</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i data-lucide="clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Scan Time</span>
                        <h3 id="res-time" class="stat-value">-</h3>
                    </div>
                </div>
            </div>

            <div class="content-grid">
                <div class="panel sources-panel">
                    <div class="panel-header">
                        <h2><i data-lucide="radar"></i> Intelligence Sources</h2>
                    </div>
                    <div class="panel-body" id="sources-list"></div>
                </div>

                <div class="panel domains-panel">
                    <div class="panel-header">
                        <h2><i data-lucide="list"></i> All Discovered Domains</h2>
                        <button id="copy-btn" class="btn-icon" title="Copy to clipboard">
                            <i data-lucide="copy"></i>
                        </button>
                    </div>
                    <div class="panel-body">
                        <div class="table-container">
                            <table class="domains-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Domain Name</th>
                                    </tr>
                                </thead>
                                <tbody id="domains-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <div class="footer-content">
                <p class="signature">0x41 <span class="heart">&lt;3</span> 0x42</p>
                <p class="sub-footer">Packets reconnect. Some hearts do not.</p>
            </div>
        </footer>
    </main>

    <script src="/static/script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
